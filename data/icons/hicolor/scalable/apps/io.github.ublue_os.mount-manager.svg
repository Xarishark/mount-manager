<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" version="1.1">
  <title>SMB Mount Manager Icon</title>
  <desc>Folder icon with SMB text and a network share base.</desc>
  <defs>
    <linearGradient id="folderBack" x1="22" y1="18" x2="98" y2="86" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffd862"/>
      <stop offset=".55" stop-color="#ffb51f"/>
      <stop offset="1" stop-color="#e88900"/>
    </linearGradient>
    <linearGradient id="folderFront" x1="18" y1="40" x2="108" y2="112" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffe575"/>
      <stop offset=".48" stop-color="#ffc222"/>
      <stop offset="1" stop-color="#f28b00"/>
    </linearGradient>
    <linearGradient id="paper" x1="39" y1="31" x2="91" y2="45" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f9fbff"/>
      <stop offset="1" stop-color="#cfd8e2"/>
    </linearGradient>
    <linearGradient id="metal" x1="24" y1="99" x2="104" y2="111" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset=".5" stop-color="#8c96a4"/>
      <stop offset="1" stop-color="#f8fbff"/>
    </linearGradient>
    <linearGradient id="post" x1="55" y1="80" x2="73" y2="109" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8f99b7"/>
      <stop offset="1" stop-color="#4a5277"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity=".35"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <path
      d="M19 29c0-5 4-9 9-9h27c3 0 6 1 8 4l6 7h33c5 0 9 4 9 9v49c0 5-4 9-9 9H28c-5 0-9-4-9-9z"
      fill="url(#folderBack)"
      stroke="#a85f00"
      stroke-width="3"
      stroke-linejoin="round"/>

    <path d="M34 36h60c4 0 7 3 7 7v24H27V43c0-4 3-7 7-7z" fill="url(#paper)" stroke="#b8c2cf" stroke-width="2"/>
    <path d="M36 44h55M36 52h49" fill="none" stroke="#aeb8c5" stroke-width="2" stroke-linecap="round"/>

    <path
      d="M17 47c0-5 4-9 9-9h76c5 0 9 4 9 9v41c0 6-5 11-11 11H28c-6 0-11-5-11-11z"
      fill="url(#folderFront)"
      stroke="#a85f00"
      stroke-width="3"
      stroke-linejoin="round"/>

    <text
      x="64"
      y="78"
      text-anchor="middle"
      font-family="DejaVu Sans, Arial, sans-serif"
      font-size="32"
      font-weight="800"
      fill="#fff7dc"
      stroke="#c77800"
      stroke-width="1.4"
      paint-order="stroke fill">SMB</text>
  </g>

  <path d="M60 98h8v16h-8z" fill="url(#post)" stroke="#3d4567" stroke-width="2"/>
  <path d="M25 115h78" fill="none" stroke="url(#metal)" stroke-width="6" stroke-linecap="round"/>
  <rect x="52" y="110" width="24" height="10" rx="3" fill="url(#post)" stroke="#3d4567" stroke-width="2"/>
</svg>
